name: MPFA Fund List Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Main Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python Dependencies
        run: pip install -r mpfa-fund-list/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run MPFA Data Fetchers
        working-directory: mpfa-fund-list
        run: python main.py

      - name: Report Constituent Fund Changes To Google Chat
        working-directory: mpfa-fund-list
        env:
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: python report_constituent_fund_changes.py

      - name: Commit And Push Updated Data To Main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mpfa-fund-list/data

          if git diff --cached --quiet; then
            echo "No data changes to publish."
            exit 0
          fi

          git commit -m "Update MPFA data"
          git push origin HEAD:main
