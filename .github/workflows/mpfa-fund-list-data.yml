name: MPFA Fund List Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Main Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python Dependencies
        run: pip install -r mpfa-fund-list/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run MPFA Data Fetchers
        working-directory: mpfa-fund-list
        run: python main.py

      - name: Publish Data Branch
        shell: bash
        run: |
          set -euo pipefail

          PUBLISH_DIR="$(mktemp -d)"
          DATA_ROOT="$GITHUB_WORKSPACE/mpfa-fund-list/data"

          git fetch origin data || true

          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git worktree add "$PUBLISH_DIR" origin/data
            cd "$PUBLISH_DIR"
            git checkout -B data origin/data
          else
            git worktree add --detach "$PUBLISH_DIR"
            cd "$PUBLISH_DIR"
            git checkout --orphan data
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mkdir -p mpfa-fund-list
          cp -R "$DATA_ROOT" mpfa-fund-list/data

          cat > README.md <<'EOF'
          # MPFA Data Branch

          This branch is auto-generated by the `MPFA Fund List Data` GitHub Actions workflow.
          It stores fetched data artifacts only.
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No data changes to publish."
            exit 0
          fi

          git commit -m "Update MPFA data"
          git push origin HEAD:data
